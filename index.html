<!DOCTYPE html>
<!--
  6-8 -- Multiplayer finger-selection PWA
  ========================================
  Deployment options (HTTPS required for iOS "Add to Home Screen"):

  GITHUB PAGES:
    1. Create a new repo at github.com (e.g. "6-8")
    2. Add this file as index.html, commit, and push to the main branch
    3. Go to repo Settings -> Pages -> Source: Deploy from branch -> main / (root)
    4. Your app is live at https://<username>.github.io/6-8/

  NETLIFY DROP:
    1. Go to app.netlify.com/drop
    2. Drag and drop this index.html file onto the page
    3. You'll get an instant HTTPS URL to share with friends
    (No account needed for drag-and-drop deploys)

  USAGE:
    Open the HTTPS URL in Safari on iPhone.
    Tap the Share button -> "Add to Home Screen".
    Launch from the Home Screen icon for full-screen experience.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="6-8">
  <meta name="theme-color" content="#000000">
  <title>6-8</title>
  <!-- Manifest for Android/Chrome PWA install (Safari uses apple-mobile-web-app-* meta tags above) -->
  <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%226-8%22%2C%22short_name%22%3A%226-8%22%2C%22display%22%3A%22fullscreen%22%2C%22background_color%22%3A%22%23000000%22%2C%22theme_color%22%3A%22%23000000%22%2C%22icons%22%3A%5B%5D%7D">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      touch-action: none;
    }

    /* Floating mode button - top right, respects notch/safe area */
    #mode-btn {
      position: fixed;
      top: calc(16px + env(safe-area-inset-top));
      right: calc(16px + env(safe-area-inset-right));
      z-index: 50;
      width: 48px;
      height: 48px;
      border-radius: 24px;
      border: 1.5px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: -0.3px;
      cursor: pointer;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
    }

    /* Settings modal overlay */
    #modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.6);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
    }

    #modal.hidden { display: none; }

    #modal-card {
      width: min(300px, calc(100vw - 48px));
      background: rgba(20, 20, 22, 0.97);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .modal-label {
      color: rgba(255, 255, 255, 0.45);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-align: center;
    }

    /* Segmented mode toggle */
    #mode-toggle {
      display: flex;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 13px;
      padding: 3px;
      gap: 3px;
    }

    .mode-opt {
      flex: 1;
      padding: 11px 8px;
      border: none;
      border-radius: 11px;
      background: transparent;
      color: rgba(255, 255, 255, 0.4);
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.15s, color 0.15s;
    }

    .mode-opt.active {
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
    }

    /* Group size counter */
    #group-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    #group-controls.hidden { display: none; }

    .counter-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .counter-label {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.38);
      letter-spacing: 0.2px;
    }

    .counter-btn {
      width: 46px;
      height: 46px;
      border-radius: 23px;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 26px;
      font-weight: 300;
      font-family: inherit;
      line-height: 1;
      cursor: pointer;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s, background 0.1s;
    }

    .counter-btn:disabled { opacity: 0.2; }
    .counter-btn:not(:disabled):active { background: rgba(255, 255, 255, 0.22); }

    #group-size-display {
      font-size: 40px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      width: 80px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    /* Done button */
    #done-btn {
      padding: 14px;
      border: none;
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.13);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      touch-action: manipulation;
    }

    #done-btn:active { background: rgba(255, 255, 255, 0.24); }

    /* ---- Setup screen ---- */
    #setup-screen {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: calc(32px + env(safe-area-inset-top)) 28px calc(32px + env(safe-area-inset-bottom));
    }

    #setup-screen.hidden { display: none; }

    #setup-inner {
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 26px;
    }

    #setup-appname {
      display: block;
      text-align: center;
      font-size: 76px;
      font-weight: 800;
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: -3px;
      line-height: 1;
      margin-bottom: 4px;
    }

    .setup-field {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .setup-field-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.45);
    }

    .setup-seg-track {
      display: flex;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 13px;
      padding: 3px;
      gap: 3px;
    }

    .setup-seg-btn {
      flex: 1;
      padding: 12px 8px;
      border: none;
      border-radius: 11px;
      background: transparent;
      color: rgba(255, 255, 255, 0.4);
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.15s, color 0.15s;
    }

    .setup-seg-btn.active {
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
    }

    #setup-group-controls { display: flex; flex-direction: column; gap: 10px; }
    #setup-group-controls.hidden { display: none; }

    .setup-counter-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #setup-counter-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    #setup-group-size {
      font-size: 40px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      width: 80px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    #setup-start {
      margin-top: 4px;
      padding: 18px;
      border: none;
      border-radius: 16px;
      background: #fff;
      color: #000;
      font-size: 17px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      touch-action: manipulation;
      width: 100%;
      letter-spacing: -0.2px;
    }

    #setup-start:active { background: rgba(255, 255, 255, 0.82); }
  </style>
</head>
<body>
  <canvas id="app"></canvas>

  <button id="mode-btn" aria-label="Open mode settings">1</button>

  <!-- Setup screen: shown on launch, dismissed by Start -->
  <div id="setup-screen" role="dialog" aria-modal="true" aria-label="Game setup">
    <div id="setup-inner">
      <span id="setup-appname">6-8</span>

      <div class="setup-field">
        <p class="setup-field-label">Players</p>
        <div class="setup-seg-track" id="setup-players-seg">
          <button class="setup-seg-btn active" data-players="6">6</button>
          <button class="setup-seg-btn"        data-players="7">7</button>
          <button class="setup-seg-btn"        data-players="8">8</button>
        </div>
      </div>

      <div class="setup-field">
        <p class="setup-field-label">Mode</p>
        <div class="setup-seg-track" id="setup-mode-seg">
          <button class="setup-seg-btn active" data-smode="single">Single</button>
          <button class="setup-seg-btn"        data-smode="group">Groups</button>
        </div>
      </div>

      <div class="setup-field" id="setup-group-controls">
        <p class="setup-field-label">Group size</p>
        <div class="setup-counter-row">
          <button id="setup-dec" class="counter-btn" aria-label="Decrease group size">&#8722;</button>
          <div id="setup-counter-center">
            <span id="setup-group-size">2</span>
            <span class="counter-label">people per group</span>
          </div>
          <button id="setup-inc" class="counter-btn" aria-label="Increase group size">&#43;</button>
        </div>
      </div>

      <button id="setup-start">Start</button>
    </div>
  </div>

  <div id="modal" class="hidden" role="dialog" aria-modal="true">
    <div id="modal-card">
      <p class="modal-label">Mode</p>
      <div id="mode-toggle">
        <button class="mode-opt active" data-mode="single">Single</button>
        <button class="mode-opt"        data-mode="group">Groups</button>
      </div>
      <div id="group-controls" class="hidden">
        <div class="counter-wrap">
          <button id="decrement" class="counter-btn" aria-label="Decrease group size">&#8722;</button>
          <span   id="group-size-display">2</span>
          <button id="increment" class="counter-btn" aria-label="Increase group size">&#43;</button>
        </div>
        <p class="counter-label">people per group</p>
      </div>
      <button id="done-btn">Done</button>
    </div>
  </div>

  <script>
  'use strict';

  // ---------------------------------------------------------------------------
  // CONSTANTS
  // ---------------------------------------------------------------------------
  const CIRCLE_R     = 62;                                   // logical px
  const RING_GAP     = 8;
  const RING_W       = 8;
  const RING_R       = CIRCLE_R + RING_GAP + RING_W / 2;    // arc center radius

  const COUNTDOWN_MS = 3000;
  const REVEAL_MS    = 440;
  const FADE_MS      = 300;
  const HOLD_MS      = 2500;   // delay before fade once all fingers lift

  const GREY_FILL    = '#4A4A4F';
  const GREY_OUT     = '#2A2A2E';

  // Vivid, maximally distinct colors (one per group slot 0-7)
  const COLORS = [
    '#FF3B30',  // red
    '#FF9500',  // orange
    '#FFCC00',  // yellow
    '#34C759',  // green
    '#00C7BE',  // teal
    '#5856D6',  // purple
    '#FF2D55',  // pink
    '#32ADE6',  // sky blue
  ];

  const S = Object.freeze({
    IDLE:        'IDLE',
    COUNTDOWN:   'COUNTDOWN',
    REVEAL:      'REVEAL',
    POST_REVEAL: 'POST_REVEAL',
    FADING:      'FADING',
  });

  // ---------------------------------------------------------------------------
  // APP STATE
  // ---------------------------------------------------------------------------
  let appState    = S.IDLE;
  const settings  = { mode: 'single', groupSize: 2, numPlayers: 6 };

  /**
   * @type {Map<number, {id:number, x:number, y:number,
   *   assignedColor:string|null, groupIndex:number, arcProgress:number}>}
   */
  const activeMap = new Map();

  /** Frozen snapshot used during POST_REVEAL and FADING */
  let frozenPoints = [];

  let countdownStart = null;
  let revealStart    = null;
  let fadeStart      = null;
  let holdTimer      = null;
  let tooManyAt      = 0;   // performance.now() when triggered; 0 = off

  // ---------------------------------------------------------------------------
  // CANVAS
  // ---------------------------------------------------------------------------
  const canvas = document.getElementById('app');
  const ctx    = canvas.getContext('2d');
  let dpr      = 1;

  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;
    const W = window.innerWidth, H = window.innerHeight;
    canvas.width        = W * dpr;
    canvas.height       = H * dpr;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.scale(dpr, dpr);
  }

  window.addEventListener('resize', () => {
    resizeCanvas();
    if (appState !== S.IDLE && appState !== S.POST_REVEAL && appState !== S.FADING) {
      resetAll();
    }
  });

  // ---------------------------------------------------------------------------
  // COLOR HELPERS
  // ---------------------------------------------------------------------------
  function hexToRgb(hex) {
    return [
      parseInt(hex.slice(1, 3), 16),
      parseInt(hex.slice(3, 5), 16),
      parseInt(hex.slice(5, 7), 16),
    ];
  }

  function lerpColor(a, b, t) {
    const [r1, g1, b1] = hexToRgb(a);
    const [r2, g2, b2] = hexToRgb(b);
    return 'rgb(' +
      Math.round(r1 + (r2 - r1) * t) + ',' +
      Math.round(g1 + (g2 - g1) * t) + ',' +
      Math.round(b1 + (b2 - b1) * t) + ')';
  }

  function easeOut3(t) { return 1 - Math.pow(1 - t, 3); }

  // ---------------------------------------------------------------------------
  // FISHER-YATES SHUFFLE
  // ---------------------------------------------------------------------------
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    return arr;
  }

  // ---------------------------------------------------------------------------
  // ASSIGNMENT
  // ---------------------------------------------------------------------------
  function assignResults() {
    const ids = shuffle([...activeMap.keys()]);

    if (settings.mode === 'single') {
      ids.forEach((id, i) => {
        const tp = activeMap.get(id);
        tp.groupIndex    = i === 0 ? 0 : -1;
        tp.assignedColor = i === 0 ? COLORS[0] : null;
      });
    } else {
      const g         = settings.groupSize;
      const numGroups = Math.floor(ids.length / g);
      ids.forEach((id, i) => {
        const tp   = activeMap.get(id);
        const gIdx = Math.floor(i / g);
        if (gIdx < numGroups) {
          tp.groupIndex    = gIdx;
          tp.assignedColor = COLORS[gIdx];
        } else {
          tp.groupIndex    = -1;   // remainder -- "out"
          tp.assignedColor = null;
        }
      });
    }
  }

  // ---------------------------------------------------------------------------
  // STATE TRANSITIONS
  // ---------------------------------------------------------------------------
  function transitionTo(next) {
    appState = next;

    if (next === S.COUNTDOWN) {
      countdownStart = null;   // set on first tick
      tooManyAt      = 0;
      for (const tp of activeMap.values()) tp.arcProgress = 0;
    }

    if (next === S.REVEAL) {
      assignResults();
      revealStart = null;      // set on first tick
    }

    if (next === S.POST_REVEAL) {
      // Freeze a snapshot for display while the hold timer counts down
      frozenPoints = [...activeMap.values()].map(tp => ({
        x: tp.x, y: tp.y,
        groupIndex:    tp.groupIndex,
        assignedColor: tp.assignedColor,
      }));
    }

    if (next === S.FADING) {
      fadeStart = null;        // set on first tick
    }

    if (next === S.IDLE) {
      countdownStart = revealStart = fadeStart = null;
      frozenPoints   = [];
      if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
      for (const tp of activeMap.values()) {
        tp.arcProgress   = 0;
        tp.assignedColor = null;
        tp.groupIndex    = -2;   // -2 = unassigned
      }
    }
  }

  function resetAll() {
    if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
    transitionTo(S.IDLE);
  }

  // ---------------------------------------------------------------------------
  // EVALUATE STATE  (called after every touch add/remove)
  // ---------------------------------------------------------------------------
  function evaluateState() {
    const n = activeMap.size;

    if (n > 8) {
      tooManyAt = performance.now();
      if (appState !== S.IDLE) transitionTo(S.IDLE);
      return;
    }

    if (n >= 6) {
      if (appState === S.IDLE) transitionTo(S.COUNTDOWN);
    } else {
      if (appState === S.COUNTDOWN) transitionTo(S.IDLE);
    }
  }

  // ---------------------------------------------------------------------------
  // TOUCH HANDLERS
  // ---------------------------------------------------------------------------
  function makeTouchPoint(t) {
    return {
      id: t.identifier, x: t.clientX, y: t.clientY,
      assignedColor: null, groupIndex: -2, arcProgress: 0,
    };
  }

  function onTouchStart(e) {
    e.preventDefault();
    // Lock out new touches during active animation phases
    if (appState === S.REVEAL || appState === S.POST_REVEAL || appState === S.FADING) return;
    for (const t of e.changedTouches) {
      if (!activeMap.has(t.identifier)) activeMap.set(t.identifier, makeTouchPoint(t));
    }
    evaluateState();
  }

  function onTouchMove(e) {
    e.preventDefault();
    for (const t of e.changedTouches) {
      const tp = activeMap.get(t.identifier);
      if (tp) { tp.x = t.clientX; tp.y = t.clientY; }
    }
  }

  function onTouchEnd(e) {
    e.preventDefault();
    for (const t of e.changedTouches) activeMap.delete(t.identifier);

    if (appState === S.POST_REVEAL) {
      // Start hold timer once everyone has lifted
      if (activeMap.size === 0 && !holdTimer) {
        holdTimer = setTimeout(() => {
          holdTimer = null;
          transitionTo(S.FADING);
        }, HOLD_MS);
      }
      return;
    }

    if (appState === S.FADING || appState === S.REVEAL) return;

    evaluateState();
  }

  // touchcancel is kept separate from touchend because iOS fires touchcancel for
  // already-tracked touches when additional fingers land beyond its per-event
  // tracking budget. Routing cancel to onTouchEnd would call evaluateState(),
  // see size < 6, and abort the countdown even though no one lifted a finger.
  // Instead, onTouchCancel removes the touch from rendering but never aborts
  // an in-progress countdown -- only a deliberate touchend does that.
  function onTouchCancel(e) {
    e.preventDefault();
    for (const t of e.changedTouches) activeMap.delete(t.identifier);

    if (appState === S.COUNTDOWN) return; // system cancel -- don't abort countdown

    if (appState === S.POST_REVEAL) {
      if (activeMap.size === 0 && !holdTimer) {
        holdTimer = setTimeout(() => { holdTimer = null; transitionTo(S.FADING); }, HOLD_MS);
      }
      return;
    }

    if (appState === S.FADING || appState === S.REVEAL) return;

    evaluateState();
  }

  canvas.addEventListener('touchstart',  onTouchStart,  { passive: false });
  canvas.addEventListener('touchmove',   onTouchMove,   { passive: false });
  canvas.addEventListener('touchend',    onTouchEnd,    { passive: false });
  canvas.addEventListener('touchcancel', onTouchCancel, { passive: false });

  // ---------------------------------------------------------------------------
  // DRAW PRIMITIVE
  // ---------------------------------------------------------------------------
  /**
   * Draw one touch circle with optional countdown ring.
   * Ring arc radius is fixed (RING_R) so it doesn't scale with the circle.
   */
  function drawCircle(x, y, color, alpha, scale, arcProg, showRing) {
    if (alpha <= 0 || scale <= 0) return;
    ctx.save();
    ctx.globalAlpha = Math.min(alpha, 1);

    // Filled circle
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, CIRCLE_R * scale, 0, Math.PI * 2);
    ctx.fill();

    if (showRing) {
      // Dim track (full 360-degree ring)
      ctx.strokeStyle = 'rgba(255,255,255,0.10)';
      ctx.lineWidth   = RING_W;
      ctx.lineCap     = 'butt';
      ctx.beginPath();
      ctx.arc(x, y, RING_R, 0, Math.PI * 2);
      ctx.stroke();

      // Bright arc fill that grows with countdown progress
      if (arcProg > 0) {
        const end = -Math.PI / 2 + Math.PI * 2 * Math.min(arcProg, 1);
        ctx.strokeStyle = 'rgba(255,255,255,0.90)';
        ctx.lineWidth   = RING_W;
        ctx.lineCap     = 'round';
        ctx.beginPath();
        ctx.arc(x, y, RING_R, -Math.PI / 2, end);
        ctx.stroke();
      }
    }

    ctx.restore();
  }

  // ---------------------------------------------------------------------------
  // RENDER: IDLE
  // ---------------------------------------------------------------------------
  function renderIdle(now) {
    const W = window.innerWidth, H = window.innerHeight;

    // Draw any fingers already on screen (waiting -- no ring)
    for (const tp of activeMap.values()) {
      drawCircle(tp.x, tp.y, GREY_FILL, 1, 1, 0, false);
    }

    // "Too many!" flash
    const FLASH_DUR = 1600;
    if (tooManyAt > 0) {
      const el = now - tooManyAt;
      if (el < FLASH_DUR) {
        const a = el < 180 ? el / 180
                : el > FLASH_DUR - 280 ? (FLASH_DUR - el) / 280
                : 1;
        ctx.save();
        ctx.globalAlpha  = a;
        ctx.fillStyle    = '#FF3B30';
        ctx.font         = 'bold ' + Math.round(W * 0.072) + 'px -apple-system, BlinkMacSystemFont, sans-serif';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('Too many!', W / 2, H / 2);
        ctx.restore();
        return; // suppress idle text while flash is showing
      } else {
        tooManyAt = 0;
      }
    }

    if (activeMap.size === 0) {
      // Full idle -- show app name and instruction
      const titleSize = Math.round(Math.min(W * 0.30, 130));
      const titleY    = H * 0.44;

      ctx.save();
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';

      ctx.fillStyle = 'rgba(255,255,255,0.13)';
      ctx.font      = 'bold ' + titleSize + 'px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.fillText('6-8', W / 2, titleY);

      ctx.fillStyle = 'rgba(255,255,255,0.38)';
      ctx.font      = Math.round(W * 0.042) + 'px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.fillText('Place 6 to 8 fingers', W / 2, titleY + titleSize * 0.60);
      ctx.restore();

    } else {
      // 1-5 fingers down -- show "Need X more" hint
      const need = 6 - activeMap.size;
      if (need > 0) {
        ctx.save();
        ctx.fillStyle    = 'rgba(255,255,255,0.32)';
        ctx.font         = Math.round(W * 0.042) + 'px -apple-system, BlinkMacSystemFont, sans-serif';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText('Need ' + need + ' more', W / 2, 88);
        ctx.restore();
      }
    }
  }

  // ---------------------------------------------------------------------------
  // RENDER: COUNTDOWN
  // ---------------------------------------------------------------------------
  function renderCountdown(now) {
    if (!countdownStart) countdownStart = now;
    const progress = Math.min((now - countdownStart) / COUNTDOWN_MS, 1);

    for (const tp of activeMap.values()) {
      tp.arcProgress = progress;
      drawCircle(tp.x, tp.y, GREY_FILL, 1, 1, progress, true);
    }

    if (progress >= 1) transitionTo(S.REVEAL);
  }

  // ---------------------------------------------------------------------------
  // RENDER: REVEAL
  // ---------------------------------------------------------------------------
  function renderReveal(now) {
    if (!revealStart) revealStart = now;
    const raw  = Math.min((now - revealStart) / REVEAL_MS, 1);
    const easy = easeOut3(raw);

    for (const tp of activeMap.values()) {
      const gIdx = tp.groupIndex;
      let color, alpha, scale;

      if (gIdx === -1) {
        // "Out" -- shrink to nothing and fade away
        scale = 1 - easy;
        alpha = 1 - easy;
        color = GREY_OUT;

      } else if (settings.mode === 'single' && gIdx !== 0) {
        // Single mode loser -- fade to very dim
        alpha = 1 - easy * 0.72;
        scale = 1;
        color = GREY_FILL;

      } else {
        // Winner (single) or group member -- burst to assigned color
        color = lerpColor(GREY_FILL, tp.assignedColor, easy);
        alpha = 1;

        if (settings.mode === 'single') {
          // Winner: scale up then back down for a pulse effect
          const pulse = raw < 0.5 ? raw * 2 : 2 - raw * 2;
          scale = 1 + pulse * 0.20;
        } else {
          // Group: quick pop overshoot (squish in then bounce out)
          scale = raw < 0.55
            ? 0.82 + (raw / 0.55) * 0.30
            : 1.12 - ((raw - 0.55) / 0.45) * 0.12;
        }
      }

      drawCircle(tp.x, tp.y, color, alpha, Math.max(scale, 0), 0, false);
    }

    if (raw >= 1) transitionTo(S.POST_REVEAL);
  }

  // ---------------------------------------------------------------------------
  // RENDER: POST_REVEAL  (frozen -- no animation)
  // ---------------------------------------------------------------------------
  function renderPostReveal() {
    for (const fp of frozenPoints) {
      if (fp.groupIndex === -1) continue;   // "out" circles gone

      const isSingleLoser = settings.mode === 'single' && fp.groupIndex !== 0;
      drawCircle(
        fp.x, fp.y,
        isSingleLoser ? GREY_FILL : fp.assignedColor,
        isSingleLoser ? 0.28 : 1,
        1, 0, false
      );
    }
  }

  // ---------------------------------------------------------------------------
  // RENDER: FADING  (all results fade to black)
  // ---------------------------------------------------------------------------
  function renderFading(now) {
    if (!fadeStart) fadeStart = now;
    const raw = Math.min((now - fadeStart) / FADE_MS, 1);

    for (const fp of frozenPoints) {
      if (fp.groupIndex === -1) continue;

      const isSingleLoser = settings.mode === 'single' && fp.groupIndex !== 0;
      const baseAlpha     = isSingleLoser ? 0.28 : 1;
      const color         = isSingleLoser ? GREY_FILL : fp.assignedColor;
      drawCircle(fp.x, fp.y, color, baseAlpha * (1 - raw), 1, 0, false);
    }

    if (raw >= 1) {
      frozenPoints = [];
      transitionTo(S.IDLE);
    }
  }

  // ---------------------------------------------------------------------------
  // MAIN RAF LOOP
  // ---------------------------------------------------------------------------
  function tick(now) {
    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

    switch (appState) {
      case S.IDLE:        renderIdle(now);       break;
      case S.COUNTDOWN:   renderCountdown(now);  break;
      case S.REVEAL:      renderReveal(now);      break;
      case S.POST_REVEAL: renderPostReveal();     break;
      case S.FADING:      renderFading(now);      break;
    }

    // DEBUG: real-time touch count -- remove before release
    (function() {
      const W = window.innerWidth, H = window.innerHeight;
      const n = activeMap.size;
      ctx.save();
      ctx.font         = 'bold 96px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle    = 'rgba(0,0,0,0.55)';
      ctx.fillText(n, W / 2 + 3, H * 0.18 + 3);
      ctx.fillStyle    = n >= 6 ? '#34C759' : '#FFCC00';
      ctx.fillText(n, W / 2, H * 0.18);
      ctx.font         = 'bold 18px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.fillStyle    = 'rgba(255,255,255,0.55)';
      ctx.fillText('touches  |  ' + appState, W / 2, H * 0.18 + 58);
      ctx.restore();
    })();

    requestAnimationFrame(tick);
  }

  // ---------------------------------------------------------------------------
  // SETUP SCREEN  (shown on launch, writes into settings, dismissed by Start)
  // ---------------------------------------------------------------------------
  const setupScreen    = document.getElementById('setup-screen');
  const setupGroupCtrl = document.getElementById('setup-group-controls');
  const setupGroupSize = document.getElementById('setup-group-size');
  const setupDecBtn    = document.getElementById('setup-dec');
  const setupIncBtn    = document.getElementById('setup-inc');

  function syncSetupUI() {
    document.querySelectorAll('#setup-players-seg .setup-seg-btn').forEach(function(btn) {
      btn.classList.toggle('active', parseInt(btn.dataset.players, 10) === settings.numPlayers);
    });
    document.querySelectorAll('#setup-mode-seg .setup-seg-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.dataset.smode === settings.mode);
    });
    setupGroupCtrl.classList.toggle('hidden', settings.mode !== 'group');
    setupGroupSize.textContent = settings.groupSize;
    setupDecBtn.disabled = settings.groupSize <= 2;
    setupIncBtn.disabled = settings.groupSize >= 4;
  }

  document.querySelectorAll('#setup-players-seg .setup-seg-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      settings.numPlayers = parseInt(btn.dataset.players, 10);
      syncSetupUI();
    });
  });

  document.querySelectorAll('#setup-mode-seg .setup-seg-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      settings.mode = btn.dataset.smode;
      syncSetupUI();
    });
  });

  setupDecBtn.addEventListener('click', function() {
    if (settings.groupSize > 2) { settings.groupSize--; syncSetupUI(); }
  });

  setupIncBtn.addEventListener('click', function() {
    if (settings.groupSize < 4) { settings.groupSize++; syncSetupUI(); }
  });

  document.getElementById('setup-start').addEventListener('click', function() {
    setupScreen.classList.add('hidden');
    syncUI(); // sync the mode-btn label to reflect setup choices
  });

  // ---------------------------------------------------------------------------
  // SETTINGS MODAL
  // ---------------------------------------------------------------------------
  const modal         = document.getElementById('modal');
  const modeBtn       = document.getElementById('mode-btn');
  const groupControls = document.getElementById('group-controls');
  const groupSizeDisp = document.getElementById('group-size-display');
  const decrementBtn  = document.getElementById('decrement');
  const incrementBtn  = document.getElementById('increment');
  const doneBtn       = document.getElementById('done-btn');

  function syncUI() {
    modeBtn.textContent       = settings.mode === 'single' ? '1' : 'G' + settings.groupSize;
    groupSizeDisp.textContent = settings.groupSize;
    groupControls.classList.toggle('hidden', settings.mode !== 'group');
    decrementBtn.disabled     = settings.groupSize <= 2;
    incrementBtn.disabled     = settings.groupSize >= 4;
    document.querySelectorAll('.mode-opt').forEach(function(b) {
      b.classList.toggle('active', b.dataset.mode === settings.mode);
    });
  }

  modeBtn.addEventListener('click', function() {
    if (appState !== S.IDLE) return;
    modal.classList.remove('hidden');
  });

  modal.addEventListener('click', function(e) {
    if (e.target === modal) modal.classList.add('hidden');
  });

  doneBtn.addEventListener('click', function() {
    modal.classList.add('hidden');
  });

  document.querySelectorAll('.mode-opt').forEach(function(btn) {
    btn.addEventListener('click', function() {
      settings.mode = btn.dataset.mode;
      syncUI();
    });
  });

  decrementBtn.addEventListener('click', function() {
    if (settings.groupSize > 2) { settings.groupSize--; syncUI(); }
  });

  incrementBtn.addEventListener('click', function() {
    if (settings.groupSize < 4) { settings.groupSize++; syncUI(); }
  });

  // ---------------------------------------------------------------------------
  // APPLE TOUCH ICON  (generated at runtime to keep the app as one file)
  // ---------------------------------------------------------------------------
  function injectIcon() {
    const size = 180;
    const ic   = document.createElement('canvas');
    ic.width   = ic.height = size;
    const ictx = ic.getContext('2d');

    ictx.fillStyle = '#000';
    ictx.fillRect(0, 0, size, size);

    ictx.fillStyle    = '#fff';
    ictx.font         = 'bold 66px -apple-system, Arial, sans-serif';
    ictx.textAlign    = 'center';
    ictx.textBaseline = 'middle';
    ictx.fillText('6-8', size / 2, size / 2);

    const link = document.createElement('link');
    link.rel   = 'apple-touch-icon';
    link.href  = ic.toDataURL('image/png');
    document.head.appendChild(link);
  }

  // ---------------------------------------------------------------------------
  // INIT
  // ---------------------------------------------------------------------------
  injectIcon();
  resizeCanvas();
  syncUI();
  syncSetupUI();
  requestAnimationFrame(tick);

  </script>
</body>
</html>
