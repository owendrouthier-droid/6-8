<!--
  6-8 -- Multiplayer finger-selection PWA
  ========================================
  Deployment options (HTTPS required for iOS "Add to Home Screen"):

  GITHUB PAGES:
    1. Create a new repo at github.com (e.g. "6-8")
    2. Add this file as index.html, commit, and push to the main branch
    3. Go to repo Settings -> Pages -> Source: Deploy from branch -> main / (root)
    4. Your app is live at https://<username>.github.io/6-8/

  NETLIFY DROP:
    1. Go to app.netlify.com/drop
    2. Drag and drop this index.html file onto the page
    3. You'll get an instant HTTPS URL to share with friends

  USAGE:
    Open the HTTPS URL in Safari on iPhone.
    Tap Share -> "Add to Home Screen".
    Launch from the Home Screen icon for full-screen experience.

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <title>6-8</title>
  <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%226-8%22%2C%22short_name%22%3A%226-8%22%2C%22display%22%3A%22fullscreen%22%2C%22background_color%22%3A%22%23000000%22%2C%22theme_color%22%3A%22%23000000%22%2C%22icons%22%3A%5B%5D%7D">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-user-select: none; user-select: none;
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
      touch-action: none;
      pointer-events: none; /* purely visual — GO button handles all input */
    }



    /* Play Again button */
    @keyframes fishFadeIn {
      from { opacity: 0; transform: scale(0.82); }
      to   { opacity: 1; transform: scale(1);    }
    }
    @keyframes fishTalk {
      0%,100% { transform: translateY(0)   rotate(-2deg) scaleX(1);    }
      20%     { transform: translateY(-7px) rotate(1.5deg) scaleX(1.02); }
      45%     { transform: translateY(-3px) rotate(-1deg)  scaleX(0.99); }
      70%     { transform: translateY(-9px) rotate(2deg)   scaleX(1.02); }
    }
    @keyframes bubblePop {
      0%   { opacity: 0; transform: scale(0)    translateY(8px);  }
      70%  {             transform: scale(1.1)  translateY(-3px); }
      100% { opacity: 1; transform: scale(1)    translateY(0);    }
    }

    #fish-container {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 30;
      cursor: pointer;
      touch-action: manipulation;
      animation: fishFadeIn 0.5s ease-out both;
    }

    #fish-img {
      width: 60vw;
      max-width: 340px;
      display: block;
      animation: fishTalk 0.75s ease-in-out infinite;
    }

    #fish-bubble {
      order: -1;
      background: #fff;
      color: #111;
      font-size: clamp(18px, 5vw, 24px);
      font-weight: 800;
      font-family: inherit;
      padding: 13px 22px;
      border-radius: 22px;
      margin-bottom: 18px;
      white-space: nowrap;
      position: relative;
      animation: bubblePop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.25s both;
    }
    #fish-bubble::after {
      content: '';
      position: absolute;
      bottom: -13px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 11px solid transparent;
      border-right: 11px solid transparent;
      border-top: 13px solid #fff;
    }

    /* ---- Setup screen ---- */
    #setup-screen {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: calc(32px + env(safe-area-inset-top)) 28px calc(32px + env(safe-area-inset-bottom));
      touch-action: auto;
    }
    #setup-screen.hidden { display: none; }

    #setup-inner {
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 26px;
    }

    #setup-appname {
      display: block;
      text-align: center;
      font-size: 76px;
      font-weight: 800;
      color: rgba(255,255,255,0.92);
      letter-spacing: -3px;
      line-height: 1;
      margin-bottom: 4px;
    }

    .setup-field { display: flex; flex-direction: column; gap: 10px; }

    .setup-field-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }

    .setup-seg-track {
      display: flex;
      background: rgba(255,255,255,0.07);
      border-radius: 13px;
      padding: 3px;
      gap: 3px;
    }

    .setup-seg-btn {
      flex: 1;
      padding: 12px 8px;
      border: none;
      border-radius: 11px;
      background: transparent;
      color: rgba(255,255,255,0.4);
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.15s, color 0.15s;
    }
    .setup-seg-btn.active { background: rgba(255,255,255,0.18); color: #fff; }

    #setup-group-controls { display: flex; flex-direction: column; gap: 10px; }
    #setup-group-controls.hidden { display: none; }

    .setup-counter-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #setup-counter-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    #setup-group-size {
      font-size: 40px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      width: 80px;
      font-variant-numeric: tabular-nums;
      line-height: 1;

    .counter-label {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.38);
      letter-spacing: 0.2px;
    }

    .counter-btn {
      width: 46px; height: 46px;
      border-radius: 23px;
      border: none;
      background: rgba(255,255,255,0.1);

      font-size: 26px;
      font-weight: 300;
      font-family: inherit;
      line-height: 1;

      justify-content: center;

      margin-top: 4px;

      border: none;
      border-radius: 16px;
      background: #fff;

      font-size: 17px;
      font-weight: 700;
      font-family: inherit;

      touch-action: manipulation;
      width: 100%;
      letter-spacing: -0.2px;
    }

<body>
  <canvas id="app"></canvas>

  <div id="setup-screen" role="dialog" aria-modal="true" aria-label="Game setup">
    <div id="setup-inner">
      <span id="setup-appname">6-8</span>

      <div class="setup-field">
        <p class="setup-field-label">Players</p>
        <div class="setup-seg-track" id="setup-players-seg">
          <button class="setup-seg-btn active" data-players="6">6</button>
          <button class="setup-seg-btn"        data-players="7">7</button>
          <button class="setup-seg-btn"        data-players="8">8</button>
        </div>
      </div>

      <div class="setup-field">
        <p class="setup-field-label">Mode</p>
        <div class="setup-seg-track" id="setup-mode-seg">
          <button class="setup-seg-btn active" data-smode="single">Single</button>
          <button class="setup-seg-btn"        data-smode="group">Groups</button>
        </div>
      </div>

      <div class="setup-field hidden" id="setup-group-controls">
        <p class="setup-field-label">Group size</p>
        <div class="setup-counter-row">
          <button id="setup-dec" class="counter-btn" aria-label="Decrease group size">&#8722;</button>
          <div id="setup-counter-center">
            <span id="setup-group-size">2</span>
            <span class="counter-label">people per group</span>
          </div>
          <button id="setup-inc" class="counter-btn" aria-label="Increase group size">&#43;</button>
        </div>
      </div>

      <button id="setup-start">Start</button>
    </div>
  </div>

  <script>
  'use strict';

  // ---------------------------------------------------------------------------
  // CONSTANTS
  // ---------------------------------------------------------------------------
  const CIRCLE_R     = 62;
  const RING_GAP     = 8;
  const RING_W       = 8;
  const RING_R       = CIRCLE_R + RING_GAP + RING_W / 2;

  const PLACEMENT_MS = 5000;  // 5-second auto-countdown before arc begins
  const COUNTDOWN_MS = 3000;
  const REVEAL_MS    = 440;
  const FADE_MS      = 300;
  const HOLD_MS      = 2500;

  const GREY_FILL    = '#4A4A4F';
  const GREY_OUT     = '#2A2A2E';

  const COLORS = [
    '#FF3B30', '#007AFF', '#34C759', '#FFD60A',
    '#FF2D55', '#FF9500', '#00C7BE', '#BF5AF2',
  ];

  const S = Object.freeze({
    PLACEMENT:   'PLACEMENT',
    COUNTDOWN:   'COUNTDOWN',
    REVEAL:      'REVEAL',
    POST_REVEAL: 'POST_REVEAL',
    FADING:      'FADING',
  });

  // ---------------------------------------------------------------------------
  // APP STATE
  // ---------------------------------------------------------------------------
  let appState = S.PLACEMENT;  // starts in PLACEMENT; setup screen overlay sits on top

  const settings = { mode: 'single', groupSize: 2, numPlayers: 6 };

  /**
   * @type {Array<{id:number, x:number, y:number,
   *   arcProgress:number, assignedColor:string|null, groupIndex:number}>}
   */
  let circles      = [];
  let frozenCircles = [];

  let placementStart = null;
  let countdownStart = null;
  let revealStart    = null;
  let fadeStart      = null;
  let holdTimer      = null;

  // ---------------------------------------------------------------------------
  // CANVAS
  // ---------------------------------------------------------------------------
  const canvas = document.getElementById('app');
  const ctx    = canvas.getContext('2d');
  let dpr      = 1;

  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;
    const W = window.innerWidth, H = window.innerHeight;
    canvas.width        = W * dpr;
    canvas.height       = H * dpr;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.scale(dpr, dpr);
  }

  window.addEventListener('resize', () => {
    resizeCanvas();
    if (circles.length === 0) return;
    if (appState === S.PLACEMENT || appState === S.COUNTDOWN) {
      createCircles();
      transitionTo(S.PLACEMENT);
    }
  });

  // ---------------------------------------------------------------------------
  // COLOR HELPERS
  // ---------------------------------------------------------------------------
  function hexToRgb(hex) {
    return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
  }

  function lerpColor(a, b, t) {
    const [r1,g1,b1] = hexToRgb(a), [r2,g2,b2] = hexToRgb(b);
    return 'rgb('+Math.round(r1+(r2-r1)*t)+','+Math.round(g1+(g2-g1)*t)+','+Math.round(b1+(b2-b1)*t)+')';
  }

  function easeOut3(t) { return 1 - Math.pow(1 - t, 3); }

  // ---------------------------------------------------------------------------
  // SHUFFLE
  // ---------------------------------------------------------------------------
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    return arr;
  }

  // ---------------------------------------------------------------------------
  // CIRCLE LAYOUT
  // ---------------------------------------------------------------------------
  function createCircles() {
    const W = window.innerWidth, H = window.innerHeight;
    const N = settings.numPlayers;

    // Leave room for safe areas and circle radius so nothing clips off-screen
    const safeTop    = 52;   // status bar estimate
    const safeBottom = 36;   // home indicator estimate
    const margin     = RING_R + 14;

    const minY = safeTop    + margin;
    const maxY = H - safeBottom - margin;
    const minX = margin;
    const maxX = W - margin;

    var positions;

    if (N === 8) {
      // Two columns of 4, evenly spaced down left and right sides
      var colX_L = minX;
      var colX_R = maxX;
      var step4  = (maxY - minY) / 3;
      positions = [
        { x: colX_L, y: Math.round(minY) },
        { x: colX_L, y: Math.round(minY + step4) },
        { x: colX_L, y: Math.round(minY + step4 * 2) },
        { x: colX_L, y: Math.round(maxY) },
        { x: colX_R, y: Math.round(minY) },
        { x: colX_R, y: Math.round(minY + step4) },
        { x: colX_R, y: Math.round(minY + step4 * 2) },
        { x: colX_R, y: Math.round(maxY) },
      ];
    } else if (N === 7) {
      // One top-center, three evenly spaced down each side, one bottom-center
      var colX_L7 = minX;
      var colX_R7 = maxX;
      var cx7     = W / 2;
      var step3   = (maxY - minY) / 2;
      positions = [
        { x: Math.round(cx7),    y: Math.round(minY) },
        { x: colX_L7, y: Math.round(minY + step3 * 0.5) },
        { x: colX_L7, y: Math.round(minY + step3 * 1.5) },
        { x: colX_R7, y: Math.round(minY + step3 * 0.5) },
        { x: colX_R7, y: Math.round(minY + step3 * 1.5) },
        { x: Math.round(cx7 - W * 0.18), y: Math.round(maxY) },
        { x: Math.round(cx7 + W * 0.18), y: Math.round(maxY) },
      ];
    } else {
      // N = 6 (or any other count): evenly spaced ellipse
      const cx = W / 2;
      const cy = (minY + maxY) / 2;
      const rx = (maxX - minX) / 2;
      const ry = (maxY - minY) / 2;
      positions = Array.from({ length: N }, function(_, i) {
        const angle = -Math.PI / 2 + (2 * Math.PI * i / N);
        return {
          x: Math.round(cx + rx * Math.cos(angle)),
          y: Math.round(cy + ry * Math.sin(angle)),
        };
      });
    }

    circles = positions.map(function(p, i) {
      return {
        id:            i,
        x:             p.x,
        y:             p.y,
        arcProgress:   0,
        assignedColor: null,
        groupIndex:    -2,
      };
    });
  }

  // ---------------------------------------------------------------------------
  // ASSIGNMENT
  // ---------------------------------------------------------------------------
  function assignResults() {
    var idxs = shuffle(circles.map(function(_, i) { return i; }));

    if (settings.mode === 'single') {
      idxs.forEach(function(idx, i) {
        circles[idx].groupIndex    = i === 0 ? 0 : -1;
        circles[idx].assignedColor = i === 0 ? COLORS[0] : null;
      });
    } else {
      var g         = settings.groupSize;
      var numGroups = Math.floor(idxs.length / g);
      idxs.forEach(function(idx, i) {
        var gIdx = Math.floor(i / g);
        if (gIdx < numGroups) {
          circles[idx].groupIndex    = gIdx;
          circles[idx].assignedColor = COLORS[gIdx];
        } else {
          circles[idx].groupIndex    = -1;
          circles[idx].assignedColor = null;
        }
      });
    }
  }

  // ---------------------------------------------------------------------------
  // STATE TRANSITIONS
  // ---------------------------------------------------------------------------
  function transitionTo(next) {
    appState = next;

    if (next === S.PLACEMENT) {
      placementStart = null;
      countdownStart = null;
      if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
      circles.forEach(function(c) {
        c.arcProgress   = 0;
        c.assignedColor = null;
        c.groupIndex    = -2;
      });
    }

    if (next === S.COUNTDOWN) {
      countdownStart = null;  // set on first tick
      circles.forEach(function(c) { c.arcProgress = 0; });
    }

    if (next === S.REVEAL) {
      assignResults();
      revealStart = null;
    }

    if (next === S.POST_REVEAL) {
      frozenCircles = circles.map(function(c) {
        return { x: c.x, y: c.y, groupIndex: c.groupIndex, assignedColor: c.assignedColor };
      });
      holdTimer = setTimeout(function() {
        holdTimer = null;
        transitionTo(S.FADING);
      }, HOLD_MS);
    }

    if (next === S.FADING) {
      fadeStart = null;
    }
  }

  // ---------------------------------------------------------------------------
  // START GAME  (called by Setup screen Start button)
  function startGame() {
    document.getElementById('setup-screen').classList.add('hidden');
    createCircles();
    transitionTo(S.PLACEMENT);

  function removeWhiteBackground(srcDataUrl, callback) {
    var offscreen = document.createElement('canvas');
    var offCtx    = offscreen.getContext('2d');
    var tmp       = new Image();
    tmp.onload = function() {
      offscreen.width  = tmp.naturalWidth;
      offscreen.height = tmp.naturalHeight;
      offCtx.drawImage(tmp, 0, 0);
      var imageData = offCtx.getImageData(0, 0, offscreen.width, offscreen.height);
      var px = imageData.data;
      for (var i = 0; i < px.length; i += 4) {
        if (px[i] > 220 && px[i+1] > 220 && px[i+2] > 220) {
          px[i+3] = 0;  // fully transparent
        }
      }
      offCtx.putImageData(imageData, 0, 0);
      callback(offscreen.toDataURL('image/png'));
    };
    tmp.src = srcDataUrl;
  }

  function showPlayAgain() {
    var wrap = document.createElement('div');
    wrap.id = 'fish-container';

    var bubble = document.createElement('div');
    bubble.id = 'fish-bubble';
    bubble.textContent = 'Play Again, Stud?';

    var img = document.createElement('img');
    img.id  = 'fish-img';
    img.alt = 'Talking bass fish';

    wrap.appendChild(bubble);
    wrap.appendChild(img);

    wrap.addEventListener('click', function() {
      wrap.remove();
      circles = [];
      document.getElementById('setup-screen').classList.remove('hidden');
      syncSetupUI();
    });

    document.body.appendChild(wrap);

    // Process image on offscreen canvas to strip white background
    removeWhiteBackground('data:image/jpeg;base64,' + FISH_B64, function(dataUrl) {
      img.src = dataUrl;
    });
  }

  // ---------------------------------------------------------------------------
  // DRAW PRIMITIVE
  // ---------------------------------------------------------------------------
  function drawCircle(x, y, color, alpha, scale, arcProg, showRing) {
    if (alpha <= 0 || scale <= 0) return;
    ctx.save();
    ctx.globalAlpha = Math.min(alpha, 1);

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, CIRCLE_R * scale, 0, Math.PI * 2);
    ctx.fill();

    if (showRing) {
      ctx.strokeStyle = 'rgba(255,255,255,0.10)';
      ctx.lineWidth   = RING_W;
      ctx.lineCap     = 'butt';
      ctx.beginPath();
      ctx.arc(x, y, RING_R, 0, Math.PI * 2);
      ctx.stroke();

      if (arcProg > 0) {
        var end = -Math.PI / 2 + Math.PI * 2 * Math.min(arcProg, 1);
        ctx.strokeStyle = 'rgba(255,255,255,0.90)';
        ctx.lineWidth   = RING_W;
        ctx.lineCap     = 'round';
        ctx.beginPath();
        ctx.arc(x, y, RING_R, -Math.PI / 2, end);
        ctx.stroke();
      }
    }

    ctx.restore();
  }

  // ---------------------------------------------------------------------------
  // RENDER: PLACEMENT  (auto-countdown 5...4...3...2...1 then start arc)
  // ---------------------------------------------------------------------------
  function renderPlacement(now) {
    if (circles.length === 0) return;  // idle after play-again, before new game starts
    if (!placementStart) placementStart = now;
    var elapsed  = now - placementStart;
    var secsLeft = 5 - Math.floor(elapsed / 1000);
    if (secsLeft < 1) secsLeft = 1;

    var W = window.innerWidth, H = window.innerHeight;

    circles.forEach(function(c) {
      drawCircle(c.x, c.y, GREY_FILL, 1, 1, 0, false);
    });

    // Instruction text
    var instrSize = Math.round(Math.min(W * 0.045, 18));
    ctx.save();
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle    = 'rgba(255,255,255,0.45)';
    ctx.font         = instrSize + 'px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.fillText('Place your fingers', W / 2, H / 2 - Math.min(W * 0.18, 74));
    ctx.restore();

    // Large countdown number
    var numSize = Math.round(Math.min(W * 0.28, 120));
    ctx.save();
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle    = 'rgba(255,255,255,0.88)';
    ctx.font         = 'bold ' + numSize + 'px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.fillText(secsLeft, W / 2, H / 2);
    ctx.restore();

    if (elapsed >= PLACEMENT_MS) transitionTo(S.COUNTDOWN);
  }

  // ---------------------------------------------------------------------------
  // RENDER: COUNTDOWN
  // ---------------------------------------------------------------------------
  function renderCountdown(now) {
    if (!countdownStart) countdownStart = now;
    var progress = Math.min((now - countdownStart) / COUNTDOWN_MS, 1);
    var W = window.innerWidth, H = window.innerHeight;

    circles.forEach(function(c) {
      c.arcProgress = progress;
      drawCircle(c.x, c.y, GREY_FILL, 1, 1, progress, true);
    });

    if (progress >= 1) transitionTo(S.REVEAL);
  }

  // ---------------------------------------------------------------------------
  // RENDER: REVEAL
  // ---------------------------------------------------------------------------
  function renderReveal(now) {
    if (!revealStart) revealStart = now;
    var raw  = Math.min((now - revealStart) / REVEAL_MS, 1);
    var easy = easeOut3(raw);

    circles.forEach(function(c) {
      var gIdx = c.groupIndex;
      var color, alpha, scale;

      if (gIdx === -1) {
        scale = 1 - easy;
        alpha = 1 - easy;
        color = GREY_OUT;
      } else if (settings.mode === 'single' && gIdx !== 0) {
        alpha = 1 - easy * 0.72;
        scale = 1;
        color = GREY_FILL;
      } else {
        color = lerpColor(GREY_FILL, c.assignedColor, easy);
        alpha = 1;
        if (settings.mode === 'single') {
          var pulse = raw < 0.5 ? raw * 2 : 2 - raw * 2;
          scale = 1 + pulse * 0.20;
        } else {
          scale = raw < 0.55
            ? 0.82 + (raw / 0.55) * 0.30
            : 1.12 - ((raw - 0.55) / 0.45) * 0.12;
        }
      }

      drawCircle(c.x, c.y, color, alpha, Math.max(scale, 0), 0, false);
    });

    if (raw >= 1) transitionTo(S.POST_REVEAL);
  }

  // ---------------------------------------------------------------------------
  // RENDER: POST_REVEAL  (frozen)
  // ---------------------------------------------------------------------------
  function renderPostReveal() {
    frozenCircles.forEach(function(c) {
      if (c.groupIndex === -1) return;
      var isSingleLoser = settings.mode === 'single' && c.groupIndex !== 0;
      drawCircle(c.x, c.y,
        isSingleLoser ? GREY_FILL : c.assignedColor,
        isSingleLoser ? 0.28 : 1,
        1, 0, false);
    });
  }

  // ---------------------------------------------------------------------------
  // RENDER: FADING
  // ---------------------------------------------------------------------------
  function renderFading(now) {
    if (!fadeStart) fadeStart = now;
    var raw = Math.min((now - fadeStart) / FADE_MS, 1);

    frozenCircles.forEach(function(c) {
      if (c.groupIndex === -1) return;
      var isSingleLoser = settings.mode === 'single' && c.groupIndex !== 0;
      var baseAlpha = isSingleLoser ? 0.28 : 1;
      var color     = isSingleLoser ? GREY_FILL : c.assignedColor;
      drawCircle(c.x, c.y, color, baseAlpha * (1 - raw), 1, 0, false);
    });

    if (raw >= 1) {
      frozenCircles = [];
      circles       = [];
      appState      = S.PLACEMENT;  // canvas draws nothing (empty circles)
      showPlayAgain();
    }
  }

  // ---------------------------------------------------------------------------
  // MAIN RAF LOOP
  // ---------------------------------------------------------------------------
  function tick(now) {
    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

    switch (appState) {
      case S.PLACEMENT:   renderPlacement(now);    break;
      case S.COUNTDOWN:   renderCountdown(now);    break;
      case S.REVEAL:      renderReveal(now);       break;
      case S.POST_REVEAL: renderPostReveal();      break;
      case S.FADING:      renderFading(now);       break;
    }

    requestAnimationFrame(tick);
  }

  // ---------------------------------------------------------------------------
  // SETUP SCREEN
  // ---------------------------------------------------------------------------
  var setupGroupCtrl = document.getElementById('setup-group-controls');
  var setupGroupSize = document.getElementById('setup-group-size');
  var setupDecBtn    = document.getElementById('setup-dec');
  var setupIncBtn    = document.getElementById('setup-inc');

  function syncSetupUI() {
    document.querySelectorAll('#setup-players-seg .setup-seg-btn').forEach(function(btn) {
      btn.classList.toggle('active', parseInt(btn.dataset.players, 10) === settings.numPlayers);
    });
    document.querySelectorAll('#setup-mode-seg .setup-seg-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.dataset.smode === settings.mode);
    });
    setupGroupCtrl.classList.toggle('hidden', settings.mode !== 'group');
    setupGroupSize.textContent = settings.groupSize;
    setupDecBtn.disabled = settings.groupSize <= 2;
    setupIncBtn.disabled = settings.groupSize >= 4;
  }

  document.querySelectorAll('#setup-players-seg .setup-seg-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      settings.numPlayers = parseInt(btn.dataset.players, 10);
      syncSetupUI();
    });
  });

  document.querySelectorAll('#setup-mode-seg .setup-seg-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      settings.mode = btn.dataset.smode;
      syncSetupUI();
    });
  });

  setupDecBtn.addEventListener('click', function() {
    if (settings.groupSize > 2) { settings.groupSize--; syncSetupUI(); }
  });
  setupIncBtn.addEventListener('click', function() {
    if (settings.groupSize < 4) { settings.groupSize++; syncSetupUI(); }
  });

  document.getElementById('setup-start').addEventListener('click', function() {
    startGame();
  });

  // ---------------------------------------------------------------------------
  // APPLE TOUCH ICON
  // ---------------------------------------------------------------------------
  function injectIcon() {
    var size = 180;
    var ic   = document.createElement('canvas');
    ic.width = ic.height = size;
    var ictx = ic.getContext('2d');
    ictx.fillStyle = '#000';
    ictx.fillRect(0, 0, size, size);
    ictx.fillStyle    = '#fff';
    ictx.font         = 'bold 66px -apple-system, Arial, sans-serif';
    ictx.textAlign    = 'center';
    ictx.textBaseline = 'middle';
    ictx.fillText('6-8', size / 2, size / 2);
    var link = document.createElement('link');
    link.rel  = 'apple-touch-icon';
    link.href = ic.toDataURL('image/png');
    document.head.appendChild(link);
  }

  // ---------------------------------------------------------------------------
  // INIT
  // ---------------------------------------------------------------------------
  injectIcon();
  resizeCanvas();
  syncSetupUI();
  requestAnimationFrame(tick);

  </script>
</body>
</html>
